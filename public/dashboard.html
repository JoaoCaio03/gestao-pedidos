<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container dashboard-container">
        <h2>Dashboard de Operações</h2>
        
        <div class="cards-grid">
            <div class="card">
                <h3>Total Registrado</h3>
                <p id="dashTotal">-</p>
            </div>
            
            <div class="card">
                <h3>Envios Desse Mês</h3>
                <p id="dashMes">-</p>
            </div>
            
            <div class="card">
                <h3>Maior Demanda</h3>
                <p id="dashDemanda">-</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
